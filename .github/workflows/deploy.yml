name: 🚀 Deploy to SiteGround

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Upload
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm ci

      # 4. Build estático → genera carpeta out/
      - name: Build
        run: npm run build

      # 5. Subir out/ a SiteGround vía FTP
      #    Solo sube archivos nuevos o modificados, NUNCA borra lo existente
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:               ${{ secrets.FTP_SERVER }}
          username:             ${{ secrets.FTP_USERNAME }}
          password:             ${{ secrets.FTP_PASSWORD }}
          local-dir:            ./out/
          server-dir:           /construxionarq.com/public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            wp-content/**
            .htaccess