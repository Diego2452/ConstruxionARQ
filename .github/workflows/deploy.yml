name: 🚀 Deploy to SiteGround

on:
  push:
    branches:
      - main          # dispara en cada push a main
  workflow_dispatch:  # también permite correrlo manualmente desde GitHub

jobs:
  build-and-deploy:
    name: Build & Upload
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node (misma versión que usás local)
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias (usa package-lock.json para reproducibilidad)
      - name: Install dependencies
        run: npm ci

      # 4. Build estático → genera carpeta out/
      - name: Build
        run: npm run build

      # 5. Subir out/ a SiteGround vía FTP
      #    Solo sube archivos nuevos o modificados (no borra los existentes)
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:      ${{ secrets.FTP_SERVER }}
          username:    ${{ secrets.FTP_USERNAME }}
          password:    ${{ secrets.FTP_PASSWORD }}
          local-dir:   ./out/
          server-dir:  /public_html/
          # Excluye archivos del servidor que no deben tocarse:
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .htaccess    # no sobreescribas tu .htaccess de SiteGround
